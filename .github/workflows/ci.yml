name: CI

on:
  push:
    branches: ["main"]
  pull_request:

jobs:
  api:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install API dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r apps/api/requirements.txt
      - name: Lint API
        run: ruff check apps/api/nexus_api apps/api/tests
      - name: Test API
        run: pytest apps/api/tests -q

  web:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: apps/web/package.json
      - name: Install web dependencies
        working-directory: apps/web
        run: npm install
      - name: Typecheck web
        working-directory: apps/web
        run: npm run typecheck
      - name: Build web
        working-directory: apps/web
        run: npm run build

  containers:
    runs-on: ubuntu-latest
    needs: [api, web]
    steps:
      - uses: actions/checkout@v4
      - name: Build API image
        run: docker build -t nexus-api:ci apps/api
      - name: Build web image
        run: docker build -t nexus-web:ci apps/web

