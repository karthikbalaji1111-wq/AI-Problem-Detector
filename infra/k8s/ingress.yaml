apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: nexus
  namespace: nexus
  annotations:
    nginx.ingress.kubernetes.io/proxy-read-timeout: "300"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "300"
spec:
  ingressClassName: nginx
  rules:
    - host: nexus.example.com
      http:
        paths:
          - path: /v1
            pathType: Prefix
            backend:
              service:
                name: nexus-api
                port:
                  number: 8000
          - path: /
            pathType: Prefix
            backend:
              service:
                name: nexus-web
                port:
                  number: 3000

